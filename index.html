<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRICK — Online</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#111214; --panel:#1b1c1f; --panel2:#232427; --line:#333438;
    --text:#f2f1ea; --muted:#9a988f; --accent:#c0392b; --accent2:#e0574a;
    --good:#3ba86b; --bad:#c0392b; --draw:#c8a13b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:radial-gradient(circle at 50% 0%, #1c1c20 0%, var(--bg) 60%);
    color:var(--text); min-height:100vh; padding:24px 16px 60px; display:flex; flex-direction:column; align-items:center;
  }
  h1{font-size:28px; letter-spacing:2px; margin:0 0 2px; color:var(--accent2);}
  .sub{color:var(--muted); font-size:13px; margin-bottom:18px; text-align:center;}
  .score{
    display:flex; align-items:center; gap:18px; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:10px 20px; margin-bottom:20px; font-size:15px;
  }
  .score b{font-size:20px;}
  .score .you{color:#5aa9e6;} .score .opp{color:var(--accent2);}
  .phase-label{font-size:12px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:10px;}
  .stage{width:100%; max-width:900px; display:flex; flex-direction:column; align-items:center;}
  .row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:16px;}
  .card{
    width:110px; height:150px; border-radius:12px; position:relative; cursor:pointer;
    background:var(--panel2); border:1px solid var(--line); overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease; user-select:none;
  }
  .card:hover{transform:translateY(-4px);}
  .card img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;}
  .card.back{
    display:flex; align-items:center; justify-content:center;
    background:repeating-linear-gradient(45deg, #2a2b2f 0 10px, #232427 10px 20px);
  }
  .card.back span{font-size:26px; color:var(--accent2); font-weight:700; letter-spacing:1px;}
  .card.selected{outline:3px solid var(--accent2); transform:translateY(-6px);}
  .card.disabled{opacity:.35; cursor:not-allowed;}
  .card .tag{
    position:absolute; bottom:4px; left:4px; right:4px; text-align:center;
    font-size:10px; letter-spacing:1px; background:rgba(0,0,0,.55); border-radius:6px; padding:2px 0;
  }
  .slot-row{display:flex; gap:14px; justify-content:center; margin-bottom:8px;}
  .slot{
    width:110px; height:150px; border-radius:12px; border:1.5px dashed var(--line);
    display:flex; align-items:center; justify-content:center; position:relative; background:var(--panel);
  }
  .slot.filled{border-style:solid;}
  .slot .num{position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff;
    font-size:11px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .slot img{width:100%; height:100%; object-fit:cover; border-radius:11px;}
  button{
    background:var(--accent); color:#fff; border:none; border-radius:8px; padding:11px 26px;
    font-size:14px; font-weight:600; letter-spacing:.5px; cursor:pointer; margin-top:6px;
  }
  button:hover{background:var(--accent2);}
  button:disabled{background:#4a4a4a; cursor:not-allowed;}
  button.ghost{background:transparent; border:1px solid var(--line); color:var(--text);}
  .hint{font-size:12px; color:var(--muted); text-align:center; max-width:460px; margin-bottom:14px;}
  .arena{display:flex; align-items:center; gap:26px; justify-content:center; margin:10px 0 18px;}
  .fighter{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .fighter .who{font-size:12px; color:var(--muted); letter-spacing:1px;}
  .vs{font-size:20px; color:var(--muted); font-weight:700;}
  .result-banner{
    font-size:16px; font-weight:700; padding:8px 20px; border-radius:8px; margin-top:6px;
    background:var(--panel2); border:1px solid var(--line);
  }
  .result-banner.win{color:var(--good); border-color:var(--good);}
  .result-banner.lose{color:var(--bad); border-color:var(--bad);}
  .result-banner.draw{color:var(--draw); border-color:var(--draw);}
  .waiting{font-size:13px; color:var(--muted); margin-top:6px;}
  .final{text-align:center;}
  .final h2{font-size:30px; margin-bottom:6px;}
  .lobby{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:26px 30px; text-align:center; max-width:440px;}
  .lobby input{
    width:100%; padding:11px 12px; border-radius:8px; border:1px solid var(--line); background:var(--panel2);
    color:var(--text); font-size:14px; margin:10px 0; text-align:center; letter-spacing:2px;
  }
  .linkbox{
    display:flex; gap:8px; align-items:center; background:var(--panel2); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; margin:12px 0; word-break:break-all; font-size:12px; color:var(--muted);
  }
  .linkbox button{margin:0; padding:6px 12px; font-size:12px; flex-shrink:0;}
  .divider{color:var(--muted); font-size:12px; margin:16px 0; letter-spacing:1px;}
</style>
</head>
<body>

<h1>BRICK</h1>
<div class="sub">Rock. Paper. Scissors. Brick. — Online multiplayer</div>

<div class="score" id="scoreBar" style="display:none;">
  <div class="you">Εσύ <b id="scoreYou">0</b></div>
  <div style="color:var(--muted)">round <span id="roundNum">1</span>/5</div>
  <div class="opp">Αντίπαλος <b id="scoreOpp">0</b></div>
</div>

<div class="stage" id="stage"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCRNiZm7DTDJi9XkbqYp7TCEAJr0HN0Tpo",
  authDomain: "brick-game-82dc1.firebaseapp.com",
  databaseURL: "https://brick-game-82dc1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "brick-game-82dc1",
  storageBucket: "brick-game-82dc1.firebasestorage.app",
  messagingSenderId: "484316981649",
  appId: "1:484316981649:web:0a1cbbf6b045f3347cd230"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CARD_IMG = {
  Rock: "https://rqkumunldqvmynqxibca.supabase.co/storage/v1/object/public/generated-images/adhoc-1784125100366.jpeg",
  Paper: "https://rqkumunldqvmynqxibca.supabase.co/storage/v1/object/public/generated-images/adhoc-1784125118953.jpeg",
  Scissors: "https://rqkumunldqvmynqxibca.supabase.co/storage/v1/object/public/generated-images/adhoc-1784125136442.jpeg",
  Brick: "https://rqkumunldqvmynqxibca.supabase.co/storage/v1/object/public/generated-images/adhoc-1784125155513.jpeg"
};

function beats(a,b){
  if(a===b) return "draw";
  if(a==="Brick") return b==="Brick" ? "draw" : "win";
  if(b==="Brick") return "lose";
  const wins = {Rock:"Scissors", Scissors:"Paper", Paper:"Rock"};
  return wins[a]===b ? "win" : "lose";
}

function makeBoard(){
  const pool = [];
  const types = ["Rock","Paper","Scissors"];
  for(let i=0;i<3;i++){ types.forEach(t=>pool.push(t)); }
  pool.push("Brick","Brick");
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const board = {};
  pool.forEach((t,i)=>{ board["c"+i] = { type: t, takenBy: null }; });
  return board;
}

function roomCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

const stage = document.getElementById("stage");
const scoreBar = document.getElementById("scoreBar");
const urlRoom = new URLSearchParams(location.search).get("room");

let me = null;
let opp = null;
let room = null;
let roomRef = null;
let unsub = null;

if(urlRoom){
  renderJoinLobby(urlRoom.toUpperCase());
} else {
  renderCreateLobby();
}

function renderCreateLobby(){
  stage.innerHTML = "";
  const box = document.createElement("div");
  box.className = "lobby";
  box.innerHTML = `
    <div class="phase-label">Νέα παρτίδα</div>
    <div class="hint" style="margin-bottom:0;">Φτιάξε δωμάτιο και στείλε το link στον φίλο σου.</div>
    <button id="createBtn">Δημιούργησε παρτίδα</button>
  `;
  stage.appendChild(box);
  document.getElementById("createBtn").onclick = createRoom;
}

function createRoom(){
  room = roomCode();
  me = "p1"; opp = "p2";
  roomRef = db.ref("rooms/" + room);
  roomRef.set({
    board: makeBoard(),
    phase: "waiting",
    round: 0,
    players: { p1: { joined:true, ready5:false, seqReady:false } }
  }).then(()=>{
    const link = location.origin + location.pathname + "?room=" + room;
    stage.innerHTML = "";
    const box = document.createElement("div");
    box.className = "lobby";
    box.innerHTML = `
      <div class="phase-label">Περιμένουμε τον φίλο σου</div>
      <div class="hint" style="margin-bottom:6px;">Στείλε αυτό το link:</div>
      <div class="linkbox"><span id="linkText">${link}</span><button id="copyBtn">Copy</button></div>
      <div class="waiting">Κωδικός δωματίου: <b>${room}</b></div>
    `;
    stage.appendChild(box);
    document.getElementById("copyBtn").onclick = ()=>{
      navigator.clipboard.writeText(link);
      document.getElementById("copyBtn").textContent = "Copied!";
    };
    listenRoom();
  });
}

function renderJoinLobby(code){
  stage.innerHTML = "";
  const box = document.createElement("div");
  box.className = "lobby";
  box.innerHTML = `
    <div class="phase-label">Συμμετοχή σε παρτίδα</div>
    <div class="hint" style="margin-bottom:0;">Κωδικός δωματίου: <b>${code}</b></div>
    <button id="joinBtn">Μπες στην παρτίδα</button>
  `;
  stage.appendChild(box);
  document.getElementById("joinBtn").onclick = ()=> joinRoom(code);
}

function joinRoom(code){
  room = code;
  me = "p2"; opp = "p1";
  roomRef = db.ref("rooms/" + room);
  roomRef.once("value").then(snap=>{
    if(!snap.exists()){
      stage.innerHTML = `<div class="lobby"><div class="phase-label">Δεν βρέθηκε δωμάτιο</div><div class="hint">Έλεγξε το link ή ζήτα νέο από τον φίλο σου.</div></div>`;
      return;
    }
    roomRef.child("players/p2").set({ joined:true, ready5:false, seqReady:false }).then(()=>{
      roomRef.child("phase").transaction(cur => cur === "waiting" ? "draft" : cur);
      listenRoom();
    });
  });
}

function myHandFromBoard(board){
  return Object.keys(board).filter(id=>board[id].takenBy===me).map(id=>({id, type:board[id].type}));
}
function oppHandFromBoard(board){
  return Object.keys(board).filter(id=>board[id].takenBy===opp).map(id=>({id, type:board[id].type}));
}

let lastPhase = null;

function listenRoom(){
  roomRef.on("value", snap=>{
    const data = snap.val();
    if(!data) return;
    render(data);
  });
}

function render(data){
  const phase = data.phase;
  const players = data.players || {};
  const board = data.board || {};

  if(phase !== "battle" && phase !== "done"){ scoreBar.style.display = "none"; }

  if(phase === "waiting"){
    return;
  }

  if(phase === "draft"){
    scoreBar.style.display = "none";
    renderDraft(board, players);
    return;
  }

  if(phase === "sequence"){
    renderSequence(board, players);
    return;
  }

  if(phase === "battle"){
    scoreBar.style.display = "flex";
    renderBattle(data);
    return;
  }

  if(phase === "done"){
    scoreBar.style.display = "flex";
    renderFinal(data);
    return;
  }
}

function renderDraft(board, players){
  const myHand = myHandFromBoard(board);
  const brickPicked = myHand.some(c=>c.type==="Brick");
  const iAmReady = players[me] && players[me].ready5;

  stage.innerHTML = "";
  const label = document.createElement("div");
  label.className = "phase-label";
  label.textContent = "Draft — διάλεξε 5 κάρτες (max 1 Brick)";
  stage.appendChild(label);

  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "Κοινή τράπουλα — ό,τι πάρεις εσύ, δεν το βλέπει πλέον ο αντίπαλος. Μόλις διαλέξεις 5, περιμένεις να τελειώσει κι εκείνος.";
  stage.appendChild(hint);

  const row = document.createElement("div");
  row.className = "row";
  Object.keys(board).forEach(id=>{
    const c = board[id];
    if(c.takenBy) return;
    const disabled = iAmReady || (c.type==="Brick" && brickPicked);
    const el = document.createElement("div");
    el.className = "card" + (disabled?" disabled":"");
    el.innerHTML = `<img src="${CARD_IMG[c.type]}" alt="${c.type}"><div class="tag">${c.type}</div>`;
    el.onclick = ()=>{
      if(disabled) return;
      roomRef.child("board/"+id+"/takenBy").transaction(cur=>{
        if(cur) return; // already taken, abort
        return me;
      }, (err, committed, snap)=>{
        if(committed && snap.val()===me){
          const newHandCount = myHand.length + 1;
          if(newHandCount>=5){
            roomRef.child("players/"+me+"/ready5").set(true);
          }
        }
      });
    };
    row.appendChild(el);
  });
  stage.appendChild(row);

  const label2 = document.createElement("div");
  label2.className = "phase-label";
  label2.style.marginTop="10px";
  label2.textContent = "Το χέρι σου";
  stage.appendChild(label2);
  const backs = document.createElement("div");
  backs.className = "row";
  for(let i=0;i<5;i++){
    const b = document.createElement("div");
    b.className = "card back";
    if(myHand[i]) b.innerHTML = "<span>?</span>"; else b.style.opacity=".25";
    backs.appendChild(b);
  }
  stage.appendChild(backs);

  const oppReady = players[opp] && players[opp].ready5;
  const w = document.createElement("div");
  w.className = "waiting";
  if(iAmReady && !oppReady) w.textContent = "Περιμένεις τον αντίπαλο να ολοκληρώσει το draft...";
  else if(iAmReady && oppReady) w.textContent = "Και οι δύο έτοιμοι — προχωράμε...";
  stage.appendChild(w);

  if(iAmReady && oppReady){
    roomRef.child("phase").transaction(cur => cur === "draft" ? "sequence" : cur);
  }
}

function renderSequence(board, players){
  const myHand = myHandFromBoard(board);
  const meReady = players[me] && players[me].seqReady;
  const oppReady = players[opp] && players[opp].seqReady;

  if(meReady){
    stage.innerHTML = "";
    const label = document.createElement("div");
    label.className = "phase-label";
    label.textContent = "Σειρά ορίστηκε";
    stage.appendChild(label);
    const w = document.createElement("div");
    w.className = "waiting";
    w.textContent = oppReady ? "Και οι δύο έτοιμοι — ξεκινάμε τη μάχη..." : "Περιμένεις τον αντίπαλο να ορίσει τη σειρά του...";
    stage.appendChild(w);
    if(oppReady){
      roomRef.child("phase").transaction(cur => cur === "sequence" ? "battle" : cur);
      roomRef.child("round").transaction(()=>0);
    }
    return;
  }

  if(!window.__seq || window.__seq.length!==5) window.__seq = [null,null,null,null,null];
  const seq = window.__seq;

  stage.innerHTML = "";
  const label = document.createElement("div");
  label.className = "phase-label";
  label.textContent = "Όρισε σειρά μάχης 1→5";
  stage.appendChild(label);
  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "Πάτα τις κάρτες με τη σειρά που θες να παίξουν.";
  stage.appendChild(hint);

  const row = document.createElement("div");
  row.className = "row";
  myHand.forEach(c=>{
    const placed = seq.includes(c.id);
    const el = document.createElement("div");
    el.className = "card" + (placed?" disabled":"");
    el.innerHTML = `<img src="${CARD_IMG[c.type]}" alt="${c.type}"><div class="tag">${c.type}</div>`;
    el.onclick = ()=>{
      if(placed) return;
      const firstEmpty = seq.indexOf(null);
      if(firstEmpty===-1) return;
      seq[firstEmpty] = c.id;
      render({phase:"sequence", players, board});
    };
    row.appendChild(el);
  });
  stage.appendChild(row);

  const label2 = document.createElement("div");
  label2.className = "phase-label";
  label2.style.marginTop="10px";
  label2.textContent = "Σειρά μάχης";
  stage.appendChild(label2);
  const slots = document.createElement("div");
  slots.className = "slot-row";
  seq.forEach((id,i)=>{
    const s = document.createElement("div");
    s.className = "slot" + (id?" filled":"");
    const num = document.createElement("div");
    num.className = "num"; num.textContent = i+1;
    s.appendChild(num);
    if(id){
      const c = myHand.find(c=>c.id===id);
      const img = document.createElement("img"); img.src = CARD_IMG[c.type];
      s.appendChild(img);
      s.onclick = ()=>{ seq[i]=null; render({phase:"sequence", players, board}); };
    }
    slots.appendChild(s);
  });
  stage.appendChild(slots);

  const btn = document.createElement("button");
  btn.textContent = "Κλείδωσε τη σειρά";
  btn.disabled = seq.includes(null);
  btn.onclick = ()=>{
    roomRef.child("players/"+me+"/seq").set(seq).then(()=>{
      roomRef.child("players/"+me+"/seqReady").set(true);
    });
  };
  stage.appendChild(btn);
}

function renderBattle(data){
  const board = data.board;
  const players = data.players;
  const r = data.round || 0;
  const myPlayer = players[me];
  const oppPlayer = players[opp];
  if(!myPlayer.seq || !oppPlayer.seq) return;

  const myCardId = myPlayer.seq[r];
  const oppCardId = oppPlayer.seq[r];
  const myCard = { id: myCardId, type: board[myCardId].type };
  const oppCard = { id: oppCardId, type: board[oppCardId].type };

  document.getElementById("scoreYou").textContent = myPlayer.wins || 0;
  document.getElementById("scoreOpp").textContent = oppPlayer.wins || 0;
  document.getElementById("roundNum").textContent = r+1;

  const myRoundReady = myPlayer.roundReady && myPlayer.roundReady[r];
  const oppRoundReady = oppPlayer.roundReady && oppPlayer.roundReady[r];

  stage.innerHTML = "";
  const label = document.createElement("div");
  label.className = "phase-label";
  label.textContent = `Γύρος ${r+1} από 5`;
  stage.appendChild(label);

  const arena = document.createElement("div");
  arena.className = "arena";

  const youWrap = document.createElement("div");
  youWrap.className = "fighter";
  youWrap.innerHTML = `<div class="who">ΕΣΥ</div>`;
  const youCardEl = document.createElement("div");
  if(myRoundReady && oppRoundReady){
    youCardEl.className = "card";
    youCardEl.innerHTML = `<img src="${CARD_IMG[myCard.type]}"><div class="tag">${myCard.type}</div>`;
  } else {
    youCardEl.className = "card back" + (myRoundReady?" selected":"");
    youCardEl.innerHTML = "<span>?</span>";
    if(!myRoundReady){
      youCardEl.style.cursor = "pointer";
      youCardEl.onclick = ()=>{
        roomRef.child("players/"+me+"/roundReady/"+r).set(true);
      };
    }
  }
  youWrap.appendChild(youCardEl);

  const vs = document.createElement("div"); vs.className="vs"; vs.textContent="VS";

  const oppWrap = document.createElement("div");
  oppWrap.className = "fighter";
  oppWrap.innerHTML = `<div class="who">ΑΝΤΙΠΑΛΟΣ</div>`;
  const oppCardEl = document.createElement("div");
  if(myRoundReady && oppRoundReady){
    oppCardEl.className = "card";
    oppCardEl.innerHTML = `<img src="${CARD_IMG[oppCard.type]}"><div class="tag">${oppCard.type}</div>`;
  } else {
    oppCardEl.className = "card back";
    oppCardEl.innerHTML = "<span>?</span>";
  }
  oppWrap.appendChild(oppCardEl);

  arena.appendChild(youWrap); arena.appendChild(vs); arena.appendChild(oppWrap);
  stage.appendChild(arena);

  if(!(myRoundReady && oppRoundReady)){
    const w = document.createElement("div");
    w.className = "waiting";
    w.textContent = myRoundReady ? "Περιμένεις τον αντίπαλο..." : `Πάτα την κάρτα Νο${r+1} σου όταν είσαι έτοιμος.`;
    stage.appendChild(w);
    return;
  }

  const res = beats(myCard.type, oppCard.type);
  let text, cls;
  if(res==="win"){ text="Κερδίζεις τον γύρο!"; cls="win"; }
  else if(res==="lose"){ text="Χάνεις τον γύρο."; cls="lose"; }
  else { text="Ισοπαλία γύρου."; cls="draw"; }

  const banner = document.createElement("div");
  banner.className = "result-banner " + cls;
  banner.textContent = text;
  stage.appendChild(banner);

  if(me==="p1"){
    if(!myPlayer.__scored || myPlayer.__scored[r]===undefined){
      if(res==="win") roomRef.child("players/p1/wins").transaction(v=>(v||0)+1);
      if(res==="lose") roomRef.child("players/p2/wins").transaction(v=>(v||0)+1);
    }
  }

  const isLast = r>=4;
  const btn = document.createElement("button");
  btn.textContent = isLast ? "Δες αποτέλεσμα" : "Επόμενος γύρος";
  btn.onclick = ()=>{
    if(me==="p1"){
      if(isLast) roomRef.child("phase").set("done");
      else roomRef.child("round").set(r+1);
    }
  };
  stage.appendChild(btn);
}

function renderFinal(data){
  const players = data.players;
  const myWins = players[me].wins || 0;
  const oppWins = players[opp].wins || 0;
  document.getElementById("scoreYou").textContent = myWins;
  document.getElementById("scoreOpp").textContent = oppWins;

  stage.innerHTML = "";
  const label = document.createElement("div");
  label.className = "phase-label";
  label.textContent = "Τέλος αγώνα";
  stage.appendChild(label);

  const final = document.createElement("div");
  final.className = "final";
  let text, color;
  if(myWins > oppWins){ text="Νίκησες!"; color="var(--good)"; }
  else if(oppWins > myWins){ text="Έχασες."; color="var(--bad)"; }
  else { text="Ισοπαλία."; color="var(--draw)"; }
  final.innerHTML = `<h2 style="color:${color}">${text}</h2><div class="sub">${myWins} — ${oppWins}</div>`;
  stage.appendChild(final);
}
</script>
</body>
</html>
